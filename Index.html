<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Portfolio | Md Limon Ali</title>
    <style>
        /* ফন্ট এবং বেসিক সেটআপ */
        body {
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* কার্ডের বাইরের ফ্রেম যা ঘুরবে */
        .vip-card {
            position: relative;
            width: 320px;
            height: 450px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ঘুরন্ত সোনালী আলো */
        .vip-card::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(#d4af37, transparent, transparent, #d4af37);
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* কার্ডের ভেতরের কন্টেন্ট বক্স */
        .content {
            position: absolute;
            inset: 4px; /* বর্ডারের পুরুত্ব */
            background: #0f0f0f;
            border-radius: 16px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .img-box {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #d4af37;
            overflow: hidden;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .vip-badge {
            background: #d4af37;
            color: black;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 10px;
            border-radius: 5px;
            margin-top: 15px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 22px;
            margin: 10px 0 5px;
            letter-spacing: 1px;
        }

        p {
            font-size: 14px;
            color: #d4af37;
            margin-bottom: 20px;
        }

        .info-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
        }

        .tag {
            background: #1a1a1a;
            border: 1px solid #333;
            font-size: 11px;
            padding: 5px 8px;
            border-radius: 4px;
        }

        .btn {
            margin-top: auto;
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #d4af37;
            color: black;
        }
    </style>
</head>
<body>

    <div class="vip-card">
        <div class="content">
            <div class="img-box">
                <img src="https://raw.githubusercontent.com/mdlimonali0008-alt/Website/main/IMG_20260116_172125.png" alt="Limon Ali">
            </div>
            <div class="vip-badge">Official VIP</div>
            <h1>Md Limon Ali</h1>
            <p>Entrepreneur & Artist</p>

            <div class="info-tags">
                <span class="tag">Founder of Subgire</span>
                <span class="tag">NSR⚡E-SPORT</span>
                <span class="tag">Freelancer</span>
            </div>

            <a href="https://github.com/mdlimonali0008-alt" target="_blank" class="btn">View Profile</a>
        </div>
    </div>

</body>
</html>
