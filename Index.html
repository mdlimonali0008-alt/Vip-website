<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Portfolio | Md Limon Ali</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #050505;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* VIP Card Design */
        .card {
            position: relative;
            width: 380px;
            padding: 40px;
            background: rgba(15, 15, 15, 0.9);
            border-radius: 20px;
            text-align: center;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }

        /* Animated Border Effect */
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 380px;
            height: 420px;
            background: linear-gradient(0deg, transparent, #d4af37, #d4af37);
            transform-origin: bottom right;
            animation: animate 6s linear infinite;
        }

        @keyframes animate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .inner-content {
            position: relative;
            z-index: 10;
            background: #0f0f0f;
            border-radius: 15px;
            padding: 20px;
        }

        .vip-tag {
            background: gold;
            color: #000;
            padding: 2px 12px;
            font-weight: 800;
            font-size: 10px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .img-box {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(45deg, #d4af37, #fff);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .img-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #0f0f0f;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .typing-text {
            color: #d4af37;
            font-weight: bold;
        }

        .badges {
            margin-top: 15px;
        }

        .badge {
            display: inline-block;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 4px;
            margin: 3px;
        }

        .social-links {
            margin-top: 20px;
        }

        .social-links a {
            color: #fff;
            margin: 0 10px;
            font-size: 18px;
            transition: 0.3s;
        }

        .social-links a:hover {
            color: gold;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="inner-content">
            <span class="vip-tag">OFFICIAL VIP</span>
            <div class="img-box">
                <img src="https://raw.githubusercontent.com/mdlimonali0008-alt/Website/main/IMG_20260116_172125.png" alt="Md Limon Ali">
            </div>
            <h1>Md Limon Ali</h1>
            <p>I am a <span class="typing-text"></span></p>

            <div class="badges">
                <span class="badge">Founder of Subgire</span>
                <span class="badge">Recording Artist</span>
                <span class="badge">NSR⚡E-SPORT</span>
            </div>

            <div class="social-links">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="https://github.com/mdlimonali0008-alt" target="_blank"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script>
        var typed = new Typed(".typing-text", {
            strings: ["Entrepreneur", "Digital Artist", "Freelancer", "Web Developer"],
            typeSpeed: 60,
            backSpeed: 40,
            loop: true
        });
    </script>
</body>
</html>
